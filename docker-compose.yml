services:
    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - charnexus-network

    php:
        build:
            context: ./docker/php
        ports:
            - "9000:9000"
            - "9003:9003"
        volumes:
            - .:/var/www/html
            - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
            - ./docker/php/conf.d/symfony.ini:/usr/local/etc/php/conf.d/symfony.ini
        networks:
            - charnexus-network
        extra_hosts:
            - "host.docker.internal:host-gateway"

    database:
        image: postgres:${POSTGRES_VERSION:-16}-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-app}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
            POSTGRES_USER: ${POSTGRES_USER:-app}
        healthcheck:
            test: [ "CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}" ]
            timeout: 5s
            retries: 5
            start_period: 60s
        depends_on:
            - php
        volumes:
            - charnexus_db_data:/var/lib/postgresql/data:rw
        networks:
            - charnexus-network

###> symfony/mercure-bundle ###
    mercure:
        image: dunglas/mercure
        restart: unless-stopped
        environment:
          # Uncomment the following line to disable HTTPS,
          SERVER_NAME: ':80'
          MERCURE_PUBLISHER_JWT_KEY: '!TestMercureJWTKeySignIdkWhatAmIDoing!'
          MERCURE_SUBSCRIBER_JWT_KEY: '!TestMercureJWTKeySignIdkWhatAmIDoing!'
          # Set the URL of your Symfony project (without trailing slash!) as value of the cors_origins directive
          MERCURE_EXTRA_DIRECTIVES: |
            cors_origins http://127.0.0.1:8000
        # Comment the following line to disable the development mode
        command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
        healthcheck:
          test: ["CMD", "curl", "-f", "https://localhost:8000/healthz"]
          timeout: 5s
          retries: 5
          start_period: 60s
        volumes:
          - mercure_data:/data
          - mercure_config:/config
        ports:
            - "8000:80"
###< symfony/mercure-bundle ###

volumes:

###> symfony/mercure-bundle ###
    mercure_data:
    mercure_config:
###< symfony/mercure-bundle ###
    charnexus_db_data:

networks:
    charnexus-network:
        driver: bridge
